# ==============================================================================
# PROJECT WARRIORS — ONTOLOGY SCHEMA: NAMED WEAPON BUILD
# pw_weapon_build.schema.yaml — rev3 (amended 2026-07-22)
# ==============================================================================
# Changes:
# - Registry base authority remains named_weapon_builds_v2_8.txt.
# - War Within delta pw_war_within_rev2_2.delta.yaml produces registry v2.9.
# - Added campaign_refs, placement, and player-availability fields.
# - Completed normalization for exact registry status strings.
# - Added explicit null/recovery and cross-ontology validation rules.
# ==============================================================================
meta:
  generated: '2026-07-22'
  revision: rev3
  supersedes: pw_weapon_build.schema.yaml rev1
  authority:
    current_registry_base: dev_src_docs/weapons_and_equipment/named_weapon_builds_v2_8.txt
    current_registry_delta: dev_src_docs/canon_lore_source_of_truth/ontology/pw_war_within_rev2_2.delta.yaml
    projected_registry: dev_src_docs/weapons_and_equipment/named_weapon_builds_v2_9.txt
    legacy_detail_registry: dev_src_docs/weapons_and_equipment/named_weapon_builds_v2_2.txt
schema:
  entity: named_weapon_build
  id_pattern: '^PW-WPN-[A-Z0-9-]+$'
  id_rules:
    - Stable IDs are authoritative; ordinal BUILD labels are historical or provisional aliases only.
    - A provisional BUILD number must never be promoted into a cross-project identifier.
  fields:
    id: {type: string, required: true}
    build_name: {type: string, required: true}
    owner:
      type: [string, 'null']
      required: true
    callsign: {type: [string, 'null'], required: false}
    platform:
      type: [string, 'null']
      required: true
    caliber: {type: [string, 'null'], required: false}
    campaign_refs:
      type: list
      items: string
      required: false
    mission_refs:
      type: list
      items: string
      required: false
    placement:
      type: [string, object, 'null']
      required: false
    player_availability:
      type: [string, object, 'null']
      required: false
    status:
      type: enum
      values:
        - locked
        - locked_core
        - working_lock
        - name_platform_locked
        - named_identity
        - name_owner_confirmed
        - name_campaign_confirmed
        - name_owner_campaign_confirmed
        - source_recovery_required
      required: true
    unresolved_fields:
      type: list
      items: string
      required: false
    sources:
      type: list
      items: string
      required: true
    historical_aliases:
      type: list
      items: string
      required: false
    notes: {type: string, required: false}
  validation_rules:
    - IDs must be unique in the authoritative registry projection.
    - build_name, owner, platform, and campaign may be null only when status explicitly permits recovery.
    - Null values must be paired with unresolved_fields or an explanatory note.
    - Temporary mission pickups must declare player_availability and must not be inferred as persistent inventory.
    - Named builds with the same or similar wording remain separate unless a source explicitly merges them.
    - DEAD BLOW and DEADBOLT are distinct identities.
    - A stable owner correction supersedes unresolved-owner placeholders without changing the build ID unless migration is explicitly authorized.
    - Exact status strings in the human-readable registry must map through status_normalization.
    - Registry deltas supersede conflicting base-registry fields only for the explicitly matched stable ID.
status_normalization:
  LOCKED: locked
  LOCKED; retired Game 2 Act II after recognition beat: locked
  LOCKED CORE: locked_core
  LOCKED CORE / FLAGS REMAIN: locked_core
  CORE BUILD LOCKED; implementation flags remain: locked_core
  CORE IDENTITY LOCKED; exact configuration pending: locked_core
  WORKING LOCK / SOURCE-READY: working_lock
  NAME / PLATFORM LOCKED; full configuration pending: name_platform_locked
  NAMED WEAPON IDENTITY; dedicated full spec pending: named_identity
  NAME / OWNER CONFIRMED; platform/placement recovery required: name_owner_confirmed
  NAME / OWNER CONFIRMED; full specification recovery required: name_owner_confirmed
  NAME / CAMPAIGN CONFIRMED; owner/specification recovery required: name_campaign_confirmed
  NAME / OWNER / CAMPAIGN CONFIRMED; platform recovery required: name_owner_campaign_confirmed
  SOURCE RECOVERY REQUIRED: source_recovery_required
