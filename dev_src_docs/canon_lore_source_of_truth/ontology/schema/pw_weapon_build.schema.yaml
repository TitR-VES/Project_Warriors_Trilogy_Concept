# ==============================================================================
# PROJECT WARRIORS — ONTOLOGY SCHEMA: NAMED WEAPON BUILD
# pw_weapon_build.schema.yaml — rev6 (amended 2026-07-23)
# ==============================================================================
# Changes:
# - Registry base authority remains named_weapon_builds_v2_8.txt.
# - Cumulative registry deltas now project through v3.3.
# - Supplemental recovery adds NOISE FLOOR, SECOND HORIZON, and HARD STAND.
# - Explicitly prevents duplicate-name promotion when an existing stable build controls.
# - Retains campaign, placement, availability, configuration, associated-weapon,
#   recovery, and unresolved-field governance.
# ==============================================================================
meta:
  generated: '2026-07-23'
  revision: rev6
  supersedes: pw_weapon_build.schema.yaml rev5
  authority:
    current_registry_base: dev_src_docs/weapons_and_equipment/named_weapon_builds_v2_8.txt
    current_registry_deltas:
      - dev_src_docs/canon_lore_source_of_truth/ontology/pw_war_within_rev2_2.delta.yaml
      - dev_src_docs/canon_lore_source_of_truth/ontology/pw_blommaert_game3_rev2_3.delta.yaml
      - dev_src_docs/canon_lore_source_of_truth/ontology/pw_transcript_batch_rev2_6.delta.yaml
      - dev_src_docs/canon_lore_source_of_truth/ontology/pw_full_transcript_recovery_rev2_7b.delta.yaml
      - dev_src_docs/canon_lore_source_of_truth/ontology/pw_supplemental_transcripts_rev2_8.delta.yaml
    projected_registry: dev_src_docs/weapons_and_equipment/named_weapon_builds_v3_3.txt
    legacy_detail_registry: dev_src_docs/weapons_and_equipment/named_weapon_builds_v2_2.txt
schema:
  entity: named_weapon_build
  id_pattern: '^PW-WPN-[A-Z0-9-]+$'
  id_rules:
    - Stable IDs are authoritative; ordinal BUILD labels are historical or provisional aliases only.
    - A provisional BUILD number must never be promoted into a cross-project identifier.
  fields:
    id: {type: string, required: true}
    build_name: {type: string, required: true}
    owner:
      type: [string, 'null']
      required: true
    callsign: {type: [string, 'null'], required: false}
    platform:
      type: [string, 'null']
      required: true
    caliber: {type: [string, object, 'null'], required: false}
    campaign_refs:
      type: list
      items: string
      required: false
    mission_refs:
      type: list
      items: string
      required: false
    placement:
      type: [string, object, 'null']
      required: false
    player_availability:
      type: [string, object, 'null']
      required: false
    configuration:
      type: [object, list, string, 'null']
      required: false
    associated_weapons:
      type: [list, 'null']
      items: string
      required: false
    status:
      type: enum
      values:
        - locked
        - locked_core
        - working_lock
        - name_platform_locked
        - named_identity
        - name_owner_confirmed
        - name_campaign_confirmed
        - name_owner_campaign_confirmed
        - source_recovery_required
      required: true
    unresolved_fields:
      type: list
      items: string
      required: false
    sources:
      type: list
      items: string
      required: true
    historical_aliases:
      type: list
      items: string
      required: false
    notes: {type: string, required: false}
  validation_rules:
    - IDs must be unique in the authoritative registry projection.
    - build_name, owner, platform, and campaign may be null only when status explicitly permits recovery.
    - registry deltas must identify the base/projection pair they transform.
    - mission-only availability must not be represented as persistent player ownership.
    - unresolved choices must remain explicit rather than being silently selected.
    - Associated weapons do not become separate named builds unless they receive their own stable IDs and source authority.
    - Transcript-era ordinal labels do not override stable IDs or create new identities.
    - A transcript candidate name that collides with an existing stable build must remain rename-required; it cannot be added as a second identity.
